<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Elevate Hub</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<style>
  :root {
    --navy:    #030328;
    --navy-2:  #0a0a3a;
    --charcoal:#1D1D1D;
    --aqua:    #00FBF0;
    --white:   #FFFFFF;
    --muted:   rgba(255,255,255,0.55);
    --line:    rgba(0,251,240,0.16);
    --glass:   rgba(255,255,255,0.04);
    --glass-2: rgba(255,255,255,0.07);
    --danger:  #ff5d6c;
    --radius:  14px;
    --font: 'Montserrat', system-ui, sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    font-family: var(--font);
    color: var(--white);
    background:
      radial-gradient(1200px 600px at 80% -10%, rgba(0,251,240,0.10), transparent 60%),
      radial-gradient(900px 500px at 0% 110%, rgba(0,251,240,0.06), transparent 55%),
      var(--navy);
    min-height: 100vh;
  }
  button { font-family: var(--font); cursor: pointer; }
  .hidden { display: none !important; }

  /* ---------- LOGIN ---------- */
  #login { min-height: 100vh; display: grid; place-items: center; padding: 24px; }
  .login-card {
    width: 100%; max-width: 380px;
    background: var(--glass); border: 1px solid var(--line);
    border-radius: var(--radius); padding: 36px 30px;
    backdrop-filter: blur(14px);
    box-shadow: 0 24px 60px rgba(0,0,0,0.45);
  }
  .brand { display: flex; align-items: baseline; gap: 8px; margin-bottom: 4px; }
  .remember {
    display: flex; align-items: center; gap: 10px; margin: 4px 0 16px;
    font-size: 0.9rem; color: var(--muted); cursor: pointer; user-select: none;
  }
  .remember input {
    width: 20px; height: 20px; accent-color: var(--aqua); cursor: pointer; flex: 0 0 auto;
  }
  .brand b { font-weight: 800; letter-spacing: 0.5px; font-size: 1.45rem; }
  .brand span { color: var(--aqua); font-weight: 800; font-size: 1.45rem; }
  .sub { color: var(--muted); font-size: 0.82rem; margin-bottom: 26px; }
  label.fld { display: block; font-size: 0.7rem; text-transform: uppercase;
    letter-spacing: 1.2px; color: var(--muted); margin: 14px 0 6px; }
  input, textarea, select {
    width: 100%; font-family: var(--font); color: var(--white);
    background: rgba(0,0,0,0.25); border: 1px solid var(--line);
    border-radius: 10px; padding: 11px 13px; font-size: 0.92rem; outline: none;
  }
  input:focus, textarea:focus, select:focus { border-color: var(--aqua); }
  select option { color: #000; }
  .btn {
    width: 100%; margin-top: 22px; border: none; border-radius: 10px;
    padding: 12px; font-weight: 700; font-size: 0.92rem;
    background: var(--aqua); color: var(--navy);
    transition: transform .08s ease, box-shadow .2s ease;
  }
  .btn:hover { box-shadow: 0 8px 24px rgba(0,251,240,0.25); }
  .btn:active { transform: translateY(1px); }
  .btn.ghost { background: var(--glass-2); color: var(--white); border: 1px solid var(--line); }
  .btn.tiny { width: auto; margin: 0; padding: 7px 12px; font-size: 0.78rem; }
  .err { color: var(--danger); font-size: 0.8rem; margin-top: 12px; min-height: 1em; }

  /* ---------- TOP BAR ---------- */
  header.bar {
    position: sticky; top: 0; z-index: 30; flex: 0 0 auto;
    display: flex; align-items: center; gap: 16px;
    padding: 14px 22px;
    background: rgba(3,3,40,0.78); backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--line);
  }
  header.bar .brand b, header.bar .brand span { font-size: 1.15rem; }
  header.bar .spacer { flex: 1; }
  .whoami { font-size: 0.8rem; color: var(--muted); }
  .whoami b { color: var(--white); font-weight: 600; }
  .pill { font-size: 0.62rem; text-transform: uppercase; letter-spacing: 1px;
    padding: 3px 8px; border-radius: 999px; border: 1px solid var(--line);
    color: var(--aqua); margin-left: 8px; }

  /* ---------- SEARCH ---------- */
  .search-wrap {
    position: relative; display: flex; align-items: center;
    margin-left: 18px; max-width: 420px; flex: 1;
  }
  .search-ico {
    position: absolute; left: 14px; color: var(--muted);
    font-size: 1.15rem; pointer-events: none;
  }
  #search {
    width: 100%; padding: 12px 34px 12px 38px; font-size: 1rem;
    border-radius: 999px; background: rgba(0,0,0,0.28); border: 1px solid var(--line);
  }
  #search:focus { border-color: var(--aqua); outline: none; }
  #search::-webkit-search-cancel-button { display: none; }
  .search-clear {
    position: absolute; right: 10px; background: none; border: none;
    color: var(--muted); font-size: 1.3rem; line-height: 1; padding: 4px 8px;
  }
  .search-clear:hover { color: var(--white); }
  .card.filtered-out { display: none; }
  .list.col-hidden { display: none; }
  body:has(.search-state:not(.hidden)) .add-list { display: none; }
  .board-none {
    width: 100%; text-align: center; align-self: center;
    color: var(--muted); font-size: 1.05rem; padding: 40px 20px;
  }
  .link-btn {
    background: none; border: none; color: var(--aqua); font-size: 1.05rem;
    font-weight: 700; cursor: pointer; text-decoration: underline; padding: 0;
  }
  .no-match {
    font-size: 0.78rem; color: var(--muted); text-align: center;
    padding: 14px 8px; font-style: italic;
  }
  mark {
    background: rgba(0,251,240,0.28); color: var(--white);
    border-radius: 3px; padding: 0 1px;
  }
  /* search results dropdown */
  .search-results {
    position: absolute; top: calc(100% + 8px); left: 0; right: 0; z-index: 60;
    background: var(--navy-2); border: 1px solid var(--line); border-radius: 12px;
    box-shadow: 0 24px 60px rgba(0,0,0,0.55); overflow: hidden;
    max-height: 60vh; overflow-y: auto;
  }
  .sr-head {
    font-size: 0.7rem; text-transform: uppercase; letter-spacing: 1.4px;
    color: var(--muted); padding: 14px 16px 8px; font-weight: 700;
  }
  .sr-item {
    display: block; width: 100%; text-align: left; background: none; border: none;
    padding: 13px 16px; color: var(--white); cursor: pointer;
  }
  .sr-item:hover, .sr-item.active { background: rgba(0,251,240,0.10); }
  .sr-title { font-size: 1rem; font-weight: 600; line-height: 1.3; }
  .sr-sub { font-size: 0.82rem; color: var(--muted); margin-top: 3px; }
  .sr-sub::before { content: "in "; }
  .sr-empty { padding: 18px 16px; font-size: 0.92rem; color: var(--muted); font-style: italic; }

  /* ---------- BOARD ---------- */
  #app { display: flex; flex-direction: column; height: 100vh; }
  .helper-strip {
    display: flex; align-items: center; gap: 14px;
    padding: 11px 22px; font-size: 0.95rem; color: var(--white);
    background: rgba(0,251,240,0.08); border-bottom: 1px solid var(--line);
    flex: 0 0 auto;
  }
  .helper-strip span { flex: 1; }
  .helper-x {
    background: none; border: 1px solid var(--line); color: var(--muted);
    border-radius: 999px; padding: 5px 12px; font-size: 0.82rem; cursor: pointer; white-space: nowrap;
  }
  .helper-x:hover { color: var(--aqua); border-color: var(--aqua); }
  .helper-strip.hidden { display: none; }

  /* search-state bar — the "how do I get back" fix */
  .search-state {
    display: flex; align-items: center; gap: 14px;
    padding: 12px 22px; font-size: 0.98rem; color: var(--white);
    background: rgba(0,251,240,0.13); border-bottom: 1px solid var(--line);
    flex: 0 0 auto;
  }
  .search-state.hidden { display: none; }
  #searchStateText { flex: 1; }
  #searchStateText b { color: var(--aqua); }
  .show-all-btn {
    background: var(--aqua); color: var(--navy); border: none; font-weight: 700;
    border-radius: 999px; padding: 9px 18px; font-size: 0.9rem; cursor: pointer; white-space: nowrap;
  }
  .show-all-btn:hover { filter: brightness(1.08); }

  .board-wrap { position: relative; flex: 1 1 auto; min-height: 0; display: flex; }
  .board {
    display: flex; gap: 18px; align-items: flex-start;
    padding: 24px 22px; overflow-x: auto;
    flex: 1 1 auto; min-height: 0; scroll-behavior: smooth;
  }
  .scroll-arrow {
    position: absolute; top: 50%; transform: translateY(-50%); z-index: 25;
    width: 56px; height: 56px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 2rem; line-height: 1; padding-bottom: 4px;
    background: var(--aqua); color: var(--navy); border: none; cursor: pointer;
    box-shadow: 0 8px 24px rgba(0,0,0,0.45); font-weight: 700;
    transition: opacity .18s ease, transform .1s ease;
  }
  .scroll-arrow:hover { transform: translateY(-50%) scale(1.06); }
  .scroll-arrow:active { transform: translateY(-50%) scale(0.96); }
  .scroll-arrow.left  { left: 10px; }
  .scroll-arrow.right { right: 10px; }
  .scroll-arrow.hidden { opacity: 0; pointer-events: none; }

  /* loading + empty states */
  .board-loading {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    width: 100%; color: var(--muted); gap: 14px; font-size: 1rem;
  }
  .spinner {
    width: 38px; height: 38px; border-radius: 50%;
    border: 3px solid var(--line); border-top-color: var(--aqua);
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .col-empty {
    font-size: 0.9rem; color: var(--muted); text-align: center;
    padding: 18px 10px; font-style: italic; pointer-events: none;
  }
  .list {
    flex: 0 0 300px; width: 300px;
    max-height: 100%;
    display: flex; flex-direction: column;
    background: var(--glass); border: 1px solid var(--line);
    border-top: 3px solid var(--col-accent, var(--aqua));
    border-radius: var(--radius); padding: 12px;
    backdrop-filter: blur(10px);
  }
  .list .count { background: color-mix(in srgb, var(--col-accent, var(--aqua)) 20%, transparent); }
  /* subtle per-column accent palette */
  .list.c0 { --col-accent: #00FBF0; }
  .list.c1 { --col-accent: #7C9CFF; }
  .list.c2 { --col-accent: #F5A97F; }
  .list.c3 { --col-accent: #A6E3A1; }
  .list.c4 { --col-accent: #F5BDE6; }
  .list.c5 { --col-accent: #EED49F; }
  .list-head { display: flex; align-items: center; gap: 8px; padding: 4px 6px 14px; cursor: grab; flex: 0 0 auto; }
  .list-head h3 { font-size: 1.02rem; font-weight: 700; letter-spacing: 0.4px; flex: 1; }
  .count {
    font-size: 0.78rem; color: var(--white); background: rgba(0,251,240,0.14);
    border-radius: 999px; padding: 2px 9px; font-weight: 700; min-width: 22px; text-align: center;
  }
  .list-menu { background: none; border: none; color: var(--muted); font-size: 1.15rem; padding: 4px 8px; cursor: pointer; }
  .list-menu:hover { color: var(--aqua); }
  .cards {
    display: flex; flex-direction: column; gap: 10px; min-height: 8px;
    overflow-y: auto; flex: 1 1 auto;
    margin: 0 -4px; padding: 0 4px;
  }
  /* slim scrollbar inside columns */
  .cards::-webkit-scrollbar { width: 8px; }
  .cards::-webkit-scrollbar-thumb { background: var(--line); border-radius: 8px; }
  .cards::-webkit-scrollbar-track { background: transparent; }
  .cards { scrollbar-width: thin; scrollbar-color: var(--line) transparent; }
  .card {
    background: var(--glass-2); border: 1px solid rgba(255,255,255,0.08);
    border-radius: 10px; padding: 14px 15px; cursor: pointer;
    transition: border-color .15s ease, transform .08s ease;
  }
  /* column banner image — clean uniform strip across the top of the column */
  .list.has-banner { padding-top: 0; }
  .list-banner {
    margin: 0 -12px 12px; aspect-ratio: 4 / 3; overflow: hidden;
    border-radius: calc(var(--radius) - 3px) calc(var(--radius) - 3px) 0 0;
    border-bottom: 1px solid var(--line); background: var(--navy-2);
  }
  .list-banner img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .list-banner-preview { aspect-ratio: 4 / 3; border-radius: 10px; overflow: hidden; border: 1px solid var(--line); background: var(--navy-2); }
  .list-banner-preview img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .card:hover { border-color: var(--aqua); transform: translateY(-1px); }
  .card .title { font-size: 1rem; font-weight: 600; line-height: 1.35; }
  .card .meta { display: flex; gap: 14px; margin-top: 10px; font-size: 0.8rem; color: var(--muted); }
  .card .meta span { display: inline-flex; align-items: center; gap: 5px; }
  .add-card, .add-list-btn {
    width: 100%; text-align: left; margin-top: 10px; background: transparent;
    border: 1px dashed var(--line); color: var(--muted); border-radius: 10px;
    padding: 9px 12px; font-size: 0.8rem; flex: 0 0 auto;
  }
  .add-card:hover, .add-list-btn:hover { color: var(--aqua); border-color: var(--aqua); }
  .add-list { flex: 0 0 300px; }
  .sortable-ghost { opacity: 0.4; }
  .sortable-drag { box-shadow: 0 14px 30px rgba(0,0,0,0.5); }

  /* ---------- MODAL ---------- */
  .overlay {
    position: fixed; inset: 0; z-index: 50; display: grid; place-items: start center;
    background: rgba(0,0,0,0.55); padding: 40px 16px; overflow-y: auto;
  }
  .modal {
    width: 100%; max-width: 640px; background: var(--navy-2);
    border: 1px solid var(--line); border-radius: var(--radius);
    box-shadow: 0 30px 80px rgba(0,0,0,0.6);
  }
  .modal-head { display: flex; align-items: flex-start; gap: 12px; padding: 22px 24px 8px; }
  .modal-head h2 { font-size: 1.15rem; font-weight: 700; flex: 1; line-height: 1.3; }
  .x {
    background: rgba(255,255,255,0.06); border: 1px solid var(--line); color: var(--muted);
    font-size: 0.9rem; font-weight: 600; line-height: 1; padding: 8px 14px;
    border-radius: 999px; cursor: pointer; white-space: nowrap;
  }
  .x:hover { color: var(--white); border-color: var(--aqua); }
  .modal-body { padding: 8px 24px 26px; }
  .section-label { font-size: 0.68rem; text-transform: uppercase; letter-spacing: 1.2px;
    color: var(--aqua); margin: 22px 0 10px; font-weight: 700; }
  .desc { font-size: 0.9rem; line-height: 1.55; color: rgba(255,255,255,0.85); white-space: pre-wrap; }
  .att { display: flex; align-items: center; gap: 10px; padding: 10px 12px;
    background: var(--glass); border: 1px solid var(--line); border-radius: 10px; margin-bottom: 8px; }
  .att .ico { width: 30px; height: 30px; display: grid; place-items: center; border-radius: 7px;
    background: rgba(0,251,240,0.12); color: var(--aqua); font-size: 0.62rem; font-weight: 700; }
  .att .lbl { flex: 1; font-size: 0.84rem; }
  .att a, .att button { color: var(--aqua); background: none; border: none; font-size: 0.8rem; text-decoration: none; cursor: pointer; }
  .embed { position: relative; padding-bottom: 56.25%; height: 0; margin-bottom: 10px; border-radius: 10px; overflow: hidden; }
  .embed iframe { position: absolute; inset: 0; width: 100%; height: 100%; border: 0; }
  .admin-box { border: 1px solid var(--line); border-radius: 10px; padding: 14px; margin-top: 14px; background: rgba(0,0,0,0.18); }
  .row { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
  .row > * { flex: 1; min-width: 120px; }
  .danger { color: var(--danger) !important; }
  /* ============ MOBILE ============ */
  @media (max-width: 640px) {
    /* Header becomes two rows: brand + sign-out on top, search full-width below */
    header.bar {
      flex-wrap: wrap; gap: 10px 12px; padding: 12px 16px;
    }
    header.bar .brand { order: 1; }
    header.bar .spacer { display: none; }
    .whoami { display: none; }              /* email overflowed; drop it on phones */
    #signout { order: 2; margin-left: auto; }
    .search-wrap {
      order: 3; flex: 1 1 100%; margin-left: 0; max-width: none;
    }
    .search-ico { display: none; }          /* placeholder text carries the meaning */
    #search {
      padding: 13px 40px 13px 16px; font-size: 1.05rem;
      background: rgba(255,255,255,0.06); border-color: var(--aqua);
    }
    .search-clear { font-size: 1.5rem; padding: 6px 10px; }

    /* Columns: show most of one card + a clear peek of the next column */
    .list, .add-list { flex: 0 0 82vw; width: 82vw; }
    .board { padding: 18px 16px 16px; gap: 14px; scroll-snap-type: x mandatory; }
    .list { scroll-snap-align: start; }

    /* Bigger tap targets */
    .card { padding: 16px 16px; }
    .card .title { font-size: 1.05rem; }

    /* Strips: tighter, readable */
    .helper-strip { font-size: 0.92rem; padding: 12px 16px; align-items: flex-start; }
    .search-state { padding: 12px 16px; flex-wrap: wrap; }
    .show-all-btn { flex: 1 1 100%; }

    /* Lift scroll arrows above the iOS Safari toolbar and shrink slightly */
    .scroll-arrow { width: 48px; height: 48px; font-size: 1.7rem; top: auto; bottom: 20px; transform: none; }
    .scroll-arrow:hover, .scroll-arrow:active { transform: none; }
    .scroll-arrow.left { left: 14px; }
    .scroll-arrow.right { right: 14px; }

    /* Login: breathing room from screen edges */
    #login { padding: 20px; }
    .login-card { width: 100%; max-width: 420px; padding: 26px 22px; }
  }
</style>
</head>
<body>

<!-- ===== LOGIN ===== -->
<div id="login">
  <div class="login-card">
    <div class="brand"><b>Elevate</b><span>Hub</span></div>
    <div class="sub">Elevate Realty Group — team resources</div>
    <label class="fld" for="email">Email</label>
    <input id="email" type="email" autocomplete="username" placeholder="you@elevate.ca" />
    <label class="fld" for="pw">Password</label>
    <input id="pw" type="password" autocomplete="current-password" placeholder="••••••••" />
    <label class="remember">
      <input type="checkbox" id="rememberMe" checked />
      <span>Remember my email on this device</span>
    </label>
    <button class="btn" id="signin">Sign in</button>
    <div class="err" id="loginErr"></div>
  </div>
</div>

<!-- ===== APP ===== -->
<div id="app" class="hidden">
  <header class="bar">
    <div class="brand"><b>Elevate</b><span>Hub</span></div>
    <div class="search-wrap">
      <span class="search-ico">⌕</span>
      <input id="search" type="search" placeholder="Search for anything…" autocomplete="off" />
      <button class="search-clear hidden" id="searchClear" title="Clear search">×</button>
      <div class="search-results hidden" id="searchResults"></div>
    </div>
    <div class="spacer"></div>
    <div class="whoami">Signed in as <b id="userName">—</b><span class="pill" id="rolePill"></span></div>
    <button class="btn ghost tiny" id="signout">Sign out</button>
  </header>
  <div class="helper-strip" id="helperStrip">
    <span>👋 Welcome. <b>Swipe or use the arrows</b> to explore the columns. Type in the search box to find anything, and click any card to open it.</span>
    <button class="helper-x" id="helperX" title="Hide this">Got it ✕</button>
  </div>
  <div class="search-state hidden" id="searchState">
    <span id="searchStateText"></span>
    <button class="show-all-btn" id="showAllBtn">← Show everything</button>
  </div>
  <div class="board-wrap">
    <button class="scroll-arrow left hidden" id="scrollLeft" title="Scroll left" aria-label="Scroll left">‹</button>
    <div class="board" id="board"></div>
    <button class="scroll-arrow right hidden" id="scrollRight" title="Scroll right" aria-label="Scroll right">›</button>
  </div>
</div>

<!-- ===== CARD MODAL ===== -->
<div class="overlay hidden" id="overlay">
  <div class="modal">
    <div class="modal-head">
      <h2 id="mTitle">—</h2>
      <button class="x" id="mClose" title="Close">✕ Close</button>
    </div>
    <div class="modal-body" id="mBody"></div>
  </div>
</div>

<!-- ===== COLUMN (LIST) EDIT MODAL ===== -->
<div class="overlay hidden" id="listOverlay">
  <div class="modal">
    <div class="modal-head">
      <h2>Edit column</h2>
      <button class="x" id="listClose" title="Close">✕ Close</button>
    </div>
    <div class="modal-body" id="listBody"></div>
  </div>
</div>

<script type="module">
import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';
import Sortable from 'https://esm.sh/sortablejs@1.15.2';

/* ===================================================================
   1. CONFIG  —  paste your project values here
   =================================================================== */
const SUPABASE_URL  = 'https://YOUR-PROJECT.supabase.co';
const SUPABASE_ANON = 'YOUR-ANON-KEY';

const sb = createClient(SUPABASE_URL, SUPABASE_ANON, {
  auth: {
    // Keep agents signed in across visits until they tap Sign out.
    // persistSession stores the refresh token; autoRefreshToken silently
    // renews the 1-hour access token in the background so they aren't
    // kicked out mid-session.
    persistSession: true,
    autoRefreshToken: true,
  },
});

/* Small helpers for the "remember my email" feature. localStorage is
   unavailable in some sandboxed previews, so every access is guarded —
   it simply no-ops there and works normally on the live site. */
const REMEMBER_KEY = 'elevateHub.rememberedEmail';
function safeGet(k) { try { return localStorage.getItem(k); } catch { return null; } }
function safeSet(k, v) { try { localStorage.setItem(k, v); } catch {} }
function safeDel(k) { try { localStorage.removeItem(k); } catch {} }

/* ===================================================================
   2. STATE
   =================================================================== */
let session = null;
let me = { id: null, name: '', role: 'agent', isAdmin: false };
let lists = [];
let cardsByList = {};
let searchQuery = '';

const $ = (id) => document.getElementById(id);

/* Direct PostgREST call (matches the Academy pattern). */
async function api(path, { method = 'GET', body, prefer } = {}) {
  const headers = {
    apikey: SUPABASE_ANON,
    Authorization: `Bearer ${session.access_token}`,
  };
  if (body) headers['Content-Type'] = 'application/json';
  if (prefer) headers['Prefer'] = prefer;
  const res = await fetch(`${SUPABASE_URL}/rest/v1/${path}`, {
    method, headers, body: body ? JSON.stringify(body) : undefined,
  });
  if (!res.ok) throw new Error(`${res.status} ${await res.text()}`);
  const txt = await res.text();
  return txt ? JSON.parse(txt) : null;
}

/* ===================================================================
   3. AUTH
   =================================================================== */
async function boot() {
  // Pre-fill a remembered email so agents don't retype it each visit.
  const remembered = safeGet(REMEMBER_KEY);
  if (remembered) {
    $('email').value = remembered;
    $('rememberMe').checked = true;
    // If email's already filled, jump focus to the password for speed.
    $('pw').focus();
  }
  const { data } = await sb.auth.getSession();
  if (data.session) { session = data.session; await enterApp(); }
}
boot();

/* Keep our captured session current. supabase-js auto-refreshes the
   access token (~hourly); without this our copy goes stale and every
   PostgREST call 401s until reload. */
sb.auth.onAuthStateChange((_event, s) => { if (s) session = s; });

$('signin').addEventListener('click', signIn);
$('pw').addEventListener('keydown', (e) => { if (e.key === 'Enter') signIn(); });

async function signIn() {
  $('loginErr').textContent = '';
  const email = $('email').value.trim();
  const password = $('pw').value;
  if (!email || !password) { $('loginErr').textContent = 'Enter your email and password.'; return; }

  // Guard: unconfigured file. Without this, sign-in fails with a vague
  // "Load failed" because fetch() is pointed at a placeholder host.
  if (SUPABASE_URL.includes('YOUR-PROJECT') || SUPABASE_ANON.includes('YOUR-ANON-KEY')) {
    $('loginErr').textContent = 'This copy isn\u2019t connected yet: set SUPABASE_URL and SUPABASE_ANON in the file.';
    return;
  }

  const btn = $('signin');
  btn.disabled = true; btn.textContent = 'Signing in\u2026';
  try {
    const { data, error } = await sb.auth.signInWithPassword({ email, password });
    if (error) { $('loginErr').textContent = error.message; return; }
    // Honor the checkbox: remember the email, or forget any prior one.
    if ($('rememberMe').checked) safeSet(REMEMBER_KEY, email);
    else safeDel(REMEMBER_KEY);
    session = data.session;
    await enterApp();
  } catch (e) {
    // A thrown exception here (vs. an `error` object) is almost always a
    // network-level failure: project paused, bad URL, or offline.
    $('loginErr').textContent =
      'Can\u2019t reach the server. The Supabase project may be paused, or the URL is wrong. ' +
      '(' + (e && e.message ? e.message : 'network error') + ')';
  } finally {
    btn.disabled = false; btn.textContent = 'Sign in';
  }
}

$('signout').addEventListener('click', async () => {
  await sb.auth.signOut();
  location.reload();
});

async function enterApp() {
  const profile = await api(`profiles?id=eq.${session.user.id}&select=*`);
  const p = profile[0] || {};
  me = {
    id: session.user.id,
    name: p.full_name || session.user.email,
    role: p.role || 'agent',
    isAdmin: p.role === 'admin',
  };
  $('userName').textContent = me.name;
  $('rolePill').textContent = me.isAdmin ? 'Admin' : 'Agent';
  $('login').classList.add('hidden');
  $('app').classList.remove('hidden');
  await loadBoard();
  // Arrows depend on final board width; recheck once layout has settled.
  requestAnimationFrame(updateArrows);
}

/* ===================================================================
   4. LOAD + RENDER BOARD
   =================================================================== */
async function loadBoard() {
  const board = $('board');
  // Reassure the user something is happening (esp. on a cold/paused project).
  board.innerHTML = `<div class="board-loading"><div class="spinner"></div><div>Loading your board…</div></div>`;
  lists = await api('lists?select=*&order=position.asc');
  const cards = await api('cards?select=*,attachments(*)&order=position.asc');

  // Batch-sign all column banner images up front so render stays synchronous.
  const coverPaths = lists.filter((l) => l.cover_path).map((l) => l.cover_path);
  const coverMap = {};
  if (coverPaths.length) {
    try {
      const { data } = await sb.storage.from('hub-files').createSignedUrls(coverPaths, 3600);
      (data || []).forEach((row) => {
        if (row && row.path && row.signedUrl) coverMap[row.path] = row.signedUrl;
      });
    } catch { /* banners just won't show; board still loads */ }
  }
  for (const l of lists) l.coverUrl = l.cover_path ? coverMap[l.cover_path] || null : null;

  cardsByList = {};
  for (const l of lists) cardsByList[l.id] = [];
  for (const c of cards) {
    (c.attachments || []).sort((a, b) => a.position - b.position);
    (cardsByList[c.list_id] ||= []).push(c);
  }
  renderBoard();
}

function renderBoard() {
  const board = $('board');
  board.innerHTML = '';

  for (let i = 0; i < lists.length; i++) {
    const l = lists[i];
    const cards = cardsByList[l.id] || [];
    const el = document.createElement('div');
    el.className = `list c${i % 6}`;
    el.dataset.listId = l.id;
    const banner = l.coverUrl
      ? `<div class="list-banner"><img src="${esc(l.coverUrl)}" alt="" loading="lazy" onerror="this.parentElement.style.display='none'" /></div>`
      : '';
    el.classList.toggle('has-banner', !!l.coverUrl);
    el.innerHTML = `
      ${banner}
      <div class="list-head">
        <h3>${esc(l.title)}</h3>
        <span class="count">${cards.length}</span>
        ${me.isAdmin ? `<button class="list-menu" title="Edit column">⋯</button>` : ''}
      </div>
      <div class="cards" data-list-id="${l.id}"></div>
      ${me.isAdmin ? `<button class="add-card">+ Add a card</button>` : ''}
    `;
    const cardsWrap = el.querySelector('.cards');
    if (cards.length) {
      cards.forEach((c) => cardsWrap.appendChild(cardEl(c)));
    } else {
      const empty = document.createElement('div');
      empty.className = 'col-empty';
      empty.textContent = 'No cards here yet';
      cardsWrap.appendChild(empty);
    }

    if (me.isAdmin) {
      el.querySelector('.add-card').addEventListener('click', () => addCard(l.id));
      el.querySelector('.list-menu').addEventListener('click', () => editList(l));
    }
    board.appendChild(el);
    if (me.isAdmin) makeCardsSortable(cardsWrap);
  }

  if (me.isAdmin) {
    const add = document.createElement('div');
    add.className = 'add-list';
    add.innerHTML = `<button class="add-list-btn">+ Add a list</button>`;
    add.querySelector('button').addEventListener('click', addList);
    board.appendChild(add);
    makeListsSortable(board);
  }

  filterBoard(); // re-apply any active search after a re-render
  updateArrows();
}

/* ===================================================================
   SEARCH — live client-side filter over title + description + labels
   =================================================================== */
function filterBoard() {
  const q = searchQuery.trim().toLowerCase();
  let totalHits = 0;
  document.querySelectorAll('.list').forEach((listEl) => {
    const wrap = listEl.querySelector('.cards');
    let shown = 0;
    wrap.querySelectorAll('.card').forEach((card) => {
      const hit = !q || (card.dataset.search || '').includes(q);
      card.classList.toggle('filtered-out', !hit);
      if (hit) shown++;
    });
    totalHits += shown;
    // Hide the "No cards here yet" note while a search is active.
    const emptyNote = wrap.querySelector('.col-empty');
    if (emptyNote) emptyNote.style.display = q ? 'none' : '';
    // While searching, hide any column that has zero matches so agents
    // only see the columns that actually contain a result.
    listEl.classList.toggle('col-hidden', !!q && shown === 0);
  });

  // If a search hides every column, show one clear message instead of a
  // blank board (so it never looks broken).
  let none = $('board').querySelector('.board-none');
  if (q && totalHits === 0) {
    if (!none) {
      none = document.createElement('div');
      none.className = 'board-none';
      $('board').appendChild(none);
    }
    none.innerHTML = `Nothing matches “${esc(searchQuery.trim())}”. <button class="link-btn" id="noneReset">Show everything</button>`;
    none.querySelector('#noneReset').addEventListener('click', () => { clearSearch(); $('search').focus(); });
  } else if (none) {
    none.remove();
  }

  return totalHits;
}

function setSearch(value) {
  searchQuery = value;
  $('searchClear').classList.toggle('hidden', !value);
  const hits = filterBoard();
  renderDropdown();

  // Search-state bar: makes "how do I get back?" obvious.
  const q = value.trim();
  const bar = $('searchState');
  if (q) {
    const noun = hits === 1 ? 'card' : 'cards';
    $('searchStateText').innerHTML =
      `Showing <b>${hits}</b> ${noun} matching “${esc(q)}”`;
    bar.classList.remove('hidden');
  } else {
    bar.classList.add('hidden');
  }

  // Fewer/more visible columns after filtering → recheck arrows.
  $('board').scrollLeft = 0;
  updateArrows();
}

function clearSearch() {
  $('search').value = '';
  setSearch('');
  $('searchResults').classList.add('hidden');
}

/* ---- results dropdown (quick-jump, like Trello's) ---- */
let ddMatches = [];   // [{id, title, listTitle}]
let ddActive = -1;    // keyboard-highlighted index

function listTitleFor(listId) {
  const l = lists.find((x) => x.id === listId);
  return l ? l.title : '';
}

function renderDropdown() {
  const dd = $('searchResults');
  const q = searchQuery.trim().toLowerCase();
  if (!q) { dd.classList.add('hidden'); dd.innerHTML = ''; ddMatches = []; ddActive = -1; return; }

  // Collect matches across all columns, board order preserved.
  ddMatches = [];
  for (const l of lists) {
    for (const c of (cardsByList[l.id] || [])) {
      const labels = (c.attachments || []).map((a) => a.label || '').join(' ');
      const hay = `${c.title} ${c.description || ''} ${labels}`.toLowerCase();
      if (hay.includes(q)) ddMatches.push({ id: c.id, title: c.title, listTitle: l.title });
    }
  }
  ddActive = -1;

  if (!ddMatches.length) {
    dd.innerHTML = `<div class="sr-empty">No cards match "${esc(searchQuery.trim())}"</div>`;
    dd.classList.remove('hidden');
    return;
  }

  const shown = ddMatches.slice(0, 12); // cap the list; board filter shows the rest
  let html = `<div class="sr-head">Cards${ddMatches.length > shown.length ? ` · showing ${shown.length} of ${ddMatches.length}` : ''}</div>`;
  shown.forEach((m, i) => {
    html += `<button class="sr-item" data-idx="${i}" data-id="${m.id}">
      <div class="sr-title">${hl(m.title, q)}</div>
      <div class="sr-sub">${esc(m.listTitle)}</div>
    </button>`;
  });
  dd.innerHTML = html;
  dd.classList.remove('hidden');
  dd.querySelectorAll('.sr-item').forEach((b) =>
    b.addEventListener('click', () => jumpToCard(b.dataset.id)));
}

/* highlight the matched substring in a title */
function hl(text, q) {
  const lc = text.toLowerCase();
  const i = lc.indexOf(q);
  if (i < 0) return esc(text);
  return esc(text.slice(0, i)) + '<mark>' + esc(text.slice(i, i + q.length)) + '</mark>' + esc(text.slice(i + q.length));
}

function jumpToCard(id) {
  $('searchResults').classList.add('hidden');
  openCard(id);
}

function moveActive(delta) {
  const items = [...$('searchResults').querySelectorAll('.sr-item')];
  if (!items.length) return;
  items[ddActive]?.classList.remove('active');
  ddActive = (ddActive + delta + items.length) % items.length;
  items[ddActive].classList.add('active');
  items[ddActive].scrollIntoView({ block: 'nearest' });
}

$('search').addEventListener('input', (e) => setSearch(e.target.value));
$('searchClear').addEventListener('click', () => { clearSearch(); $('search').focus(); });
$('showAllBtn').addEventListener('click', () => { clearSearch(); $('search').focus(); });
$('search').addEventListener('keydown', (e) => {
  if (e.key === 'Escape') { clearSearch(); $('search').blur(); return; }
  if (e.key === 'ArrowDown') { e.preventDefault(); moveActive(1); }
  else if (e.key === 'ArrowUp') { e.preventDefault(); moveActive(-1); }
  else if (e.key === 'Enter') {
    const items = [...$('searchResults').querySelectorAll('.sr-item')];
    const pick = ddActive >= 0 ? items[ddActive] : items[0];
    if (pick) jumpToCard(pick.dataset.id);
  }
});
// Close the dropdown when clicking elsewhere; reopen on focus if a query exists.
document.addEventListener('click', (e) => {
  if (!e.target.closest('.search-wrap')) $('searchResults').classList.add('hidden');
});
$('search').addEventListener('focus', () => { if (searchQuery.trim()) renderDropdown(); });

// Press "/" anywhere to jump to search (like Trello/Gmail). Ignored while typing.
document.addEventListener('keydown', (e) => {
  if (e.key === '/' && !/^(INPUT|TEXTAREA)$/.test(document.activeElement.tagName)
      && !$('app').classList.contains('hidden')) {
    e.preventDefault();
    $('search').focus();
  }
});

// Dismiss the welcome helper strip for this session.
$('helperX').addEventListener('click', () => { $('helperStrip').classList.add('hidden'); updateArrows(); });

/* ---- horizontal scroll arrows (discoverability for sideways scroll) ---- */
function updateArrows() {
  const b = $('board');
  const max = b.scrollWidth - b.clientWidth;
  const fits = max <= 4; // whole board already visible → no arrows
  $('scrollLeft').classList.toggle('hidden', fits || b.scrollLeft <= 4);
  $('scrollRight').classList.toggle('hidden', fits || b.scrollLeft >= max - 4);
}
function scrollBoard(dir) {
  const b = $('board');
  b.scrollBy({ left: dir * Math.max(320, b.clientWidth * 0.7), behavior: 'smooth' });
}
$('scrollLeft').addEventListener('click', () => scrollBoard(-1));
$('scrollRight').addEventListener('click', () => scrollBoard(1));
$('board').addEventListener('scroll', updateArrows);
window.addEventListener('resize', updateArrows);

function cardEl(c) {
  const el = document.createElement('div');
  el.className = 'card';
  el.dataset.cardId = c.id;
  // Precomputed haystack: title + description + attachment labels, lowercased.
  const labels = (c.attachments || []).map((a) => a.label || '').join(' ');
  el.dataset.search = `${c.title} ${c.description || ''} ${labels}`.toLowerCase();
  const fileCount  = (c.attachments || []).filter((a) => a.type === 'file').length;
  const videoCount = (c.attachments || []).filter((a) => a.type === 'video').length;
  const meta = [];
  if (c.description) meta.push(`<span title="This card has details">📄 Details</span>`);
  if (fileCount)  meta.push(`<span>📎 ${fileCount} ${fileCount === 1 ? 'file' : 'files'}</span>`);
  if (videoCount) meta.push(`<span>▶ ${videoCount} ${videoCount === 1 ? 'video' : 'videos'}</span>`);
  el.innerHTML = `<div class="title">${esc(c.title)}</div>${
    meta.length ? `<div class="meta">${meta.join('')}</div>` : ''}`;
  el.addEventListener('click', () => openCard(c.id));
  return el;
}

/* ===================================================================
   5. DRAG + DROP (admin only) — persists position to Supabase
   =================================================================== */
function makeCardsSortable(wrap) {
  new Sortable(wrap, {
    group: 'cards', animation: 150,
    ghostClass: 'sortable-ghost', dragClass: 'sortable-drag',
    onEnd: persistCardOrder,
  });
}
function makeListsSortable(board) {
  new Sortable(board, {
    animation: 150, draggable: '.list', handle: '.list-head',
    ghostClass: 'sortable-ghost',
    onEnd: persistListOrder,
  });
}

async function persistCardOrder(evt) {
  const fromId = evt.from.dataset.listId;
  const toId   = evt.to.dataset.listId;
  const updates = [];
  for (const wrapId of new Set([fromId, toId])) {
    const wrap = document.querySelector(`.cards[data-list-id="${wrapId}"]`);
    [...wrap.children].forEach((el, i) => {
      updates.push(api(`cards?id=eq.${el.dataset.cardId}`, {
        method: 'PATCH', body: { position: i, list_id: wrapId }, prefer: 'return=minimal',
      }));
    });
  }
  try { await Promise.all(updates); await loadBoard(); }
  catch (e) { alert('Could not save order: ' + e.message); await loadBoard(); }
}

async function persistListOrder() {
  const els = [...document.querySelectorAll('.list')];
  try {
    await Promise.all(els.map((el, i) =>
      api(`lists?id=eq.${el.dataset.listId}`, { method: 'PATCH', body: { position: i }, prefer: 'return=minimal' })));
    await loadBoard();
  } catch (e) { alert('Could not save list order: ' + e.message); await loadBoard(); }
}

   =================================================================== */
async function addList() {
  const title = prompt('New list name:');
  if (!title) return;
  await api('lists', { method: 'POST', body: { title, position: lists.length }, prefer: 'return=minimal' });
  await loadBoard();
}
let editingList = null;

function editList(l) {
  editingList = l;
  const hasBanner = !!l.cover_path;
  $('listBody').innerHTML = `
    <div class="section-label" style="margin-top:0">Column name</div>
    <input id="lTitle" value="${esc(l.title)}" />
    <div class="row" style="margin-top:10px">
      <button class="btn tiny" id="saveList">Save name</button>
      <button class="btn ghost tiny danger" id="delList">Delete column</button>
    </div>
    <div class="section-label">Banner image</div>
    <div class="desc" style="color:var(--muted);font-size:.82rem;margin-bottom:8px">
      Shows as a uniform image across the top of this column. All banners are cropped to the same shape (roughly 4:3), so any photo works — landscape shots look best.
    </div>
    ${hasBanner ? `<div class="list-banner-preview"><img id="lPreview" alt="current banner" /></div>` : ''}
    <div class="row" style="margin-top:10px">
      <input id="listCoverFile" type="file" accept="image/*" />
      <button class="btn tiny" id="setListCover">${hasBanner ? 'Replace banner image' : 'Set banner image'}</button>
      ${hasBanner ? `<button class="btn ghost tiny danger" id="removeListCover">Remove banner</button>` : ''}
    </div>
    <div class="err" id="listCoverErr"></div>
  `;
  $('listOverlay').classList.remove('hidden');

  // Show the current banner via a fresh signed URL (l.coverUrl may be stale).
  if (hasBanner) {
    sb.storage.from('hub-files').createSignedUrl(l.cover_path, 3600)
      .then(({ data }) => { if (data && $('lPreview')) $('lPreview').src = data.signedUrl; })
      .catch(() => {});
  }

  $('saveList').addEventListener('click', () => renameList(l));
  $('delList').addEventListener('click', () => deleteList(l));
  $('setListCover').addEventListener('click', () => setListCover(l));
  if ($('removeListCover')) $('removeListCover').addEventListener('click', () => removeListCover(l));
}

function closeListDialog() { $('listOverlay').classList.add('hidden'); editingList = null; }
$('listClose').addEventListener('click', closeListDialog);
$('listOverlay').addEventListener('click', (e) => { if (e.target === $('listOverlay')) closeListDialog(); });

async function renameList(l) {
  const title = $('lTitle').value.trim();
  if (!title) return;
  await api(`lists?id=eq.${l.id}`, { method: 'PATCH', body: { title }, prefer: 'return=minimal' });
  closeListDialog(); await loadBoard();
}

async function deleteList(l) {
  if (!confirm(`Delete "${l.title}" and all its cards?`)) return;
  const path = l.cover_path;
  await api(`lists?id=eq.${l.id}`, { method: 'DELETE', prefer: 'return=minimal' });
  if (path) { try { await sb.storage.from('hub-files').remove([path]); } catch {} }
  closeListDialog(); await loadBoard();
}
async function addCard(listId) {
  const title = prompt('Card title:');
  if (!title) return;
  const pos = (cardsByList[listId] || []).length;
  await api('cards', { method: 'POST', body: { list_id: listId, title, position: pos }, prefer: 'return=minimal' });
  await loadBoard();
}

/* ===================================================================
   7. CARD MODAL
   =================================================================== */
let openCardId = null;

async function openCard(id) {
  openCardId = id;
  const card = findCard(id);
  $('mTitle').textContent = card.title;
  renderModal(card);
  $('overlay').classList.remove('hidden');
}
$('mClose').addEventListener('click', closeModal);
$('overlay').addEventListener('click', (e) => { if (e.target === $('overlay')) closeModal(); });
function closeModal() { $('overlay').classList.add('hidden'); openCardId = null; }

function renderModal(card) {
  const atts = card.attachments || [];
  const videos = atts.filter((a) => a.type === 'video');
  const files  = atts.filter((a) => a.type === 'file');
  const links  = atts.filter((a) => a.type === 'link');

  let html = '';

  html += `<div class="section-label">Description</div>`;
  html += card.description
    ? `<div class="desc">${esc(card.description)}</div>`
    : `<div class="desc" style="color:var(--muted)">No description yet.</div>`;

  if (videos.length) {
    html += `<div class="section-label">Video</div>`;
    videos.forEach((v) => {
      const src = embedUrl(v.url);
      html += src
        ? `<div class="embed"><iframe src="${src}" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe></div>`
        : `<div class="att"><div class="ico">▶</div><div class="lbl">${esc(v.label)}</div><a href="${esc(v.url)}" target="_blank" rel="noopener">Open ↗</a></div>`;
      if (me.isAdmin) html += `<div class="att"><div class="lbl" style="color:var(--muted);font-size:.78rem">${esc(v.label)}</div><button class="danger" data-delatt="${v.id}">Remove video</button></div>`;
    });
  }

  if (files.length || links.length) {
    html += `<div class="section-label">Attachments</div>`;
    files.forEach((f) => {
      html += `<div class="att">
        <div class="ico">${esc(extLabel(f.label))}</div>
        <div class="lbl">${esc(f.label)}</div>
        <button data-dl="${esc(f.storage_path)}">Download ↓</button>
        ${me.isAdmin ? `<button class="danger" data-delatt="${f.id}" data-path="${esc(f.storage_path)}">Delete</button>` : ''}
      </div>`;
    });
    links.forEach((lk) => {
      html += `<div class="att">
        <div class="ico">🔗</div>
        <div class="lbl">${esc(lk.label)}</div>
        <a href="${esc(lk.url)}" target="_blank" rel="noopener">Open ↗</a>
        ${me.isAdmin ? `<button class="danger" data-delatt="${lk.id}">Delete</button>` : ''}
      </div>`;
    });
  }

  if (me.isAdmin) {
    html += `
      <div class="admin-box">
        <div class="section-label" style="margin-top:0">Edit card</div>
        <input id="eTitle" value="${esc(card.title)}" />
        <textarea id="eDesc" rows="4" style="margin-top:10px" placeholder="Description...">${esc(card.description || '')}</textarea>
        <div class="row" style="margin-top:10px">
          <button class="btn tiny" id="saveCard">Save changes</button>
          <button class="btn ghost tiny danger" id="delCard">Delete card</button>
        </div>
        <div class="section-label">Add attachment</div>
        <div class="row">
          <select id="aType">
            <option value="file">File (PDF, image, doc…)</option>
            <option value="video">Video embed (YouTube / Vimeo / Loom)</option>
            <option value="link">External link</option>
          </select>
        </div>
        <div class="row" style="margin-top:10px">
          <input id="aLabel" placeholder="Label shown to agents" />
        </div>
        <div class="row" id="aFileRow" style="margin-top:10px">
          <input id="aFile" type="file" />
        </div>
        <div class="row hidden" id="aUrlRow" style="margin-top:10px">
          <input id="aUrl" placeholder="Paste URL" />
        </div>
        <div class="row" style="margin-top:10px">
          <button class="btn tiny" id="addAtt">Add attachment</button>
        </div>
        <div class="err" id="attErr"></div>
      </div>`;
  }

  $('mBody').innerHTML = html;
  wireModal(card);
}

function wireModal(card) {
  $('mBody').querySelectorAll('[data-dl]').forEach((b) =>
    b.addEventListener('click', () => download(b.dataset.dl)));

  if (!me.isAdmin) return;

  $('mBody').querySelectorAll('[data-delatt]').forEach((b) =>
    b.addEventListener('click', () => deleteAttachment(b.dataset.delatt, b.dataset.path)));

  const typeSel = $('aType');
  const sync = () => {
    const isFile = typeSel.value === 'file';
    $('aFileRow').classList.toggle('hidden', !isFile);
    $('aUrlRow').classList.toggle('hidden', isFile);
  };
  typeSel.addEventListener('change', sync); sync();

  $('saveCard').addEventListener('click', () => saveCard(card.id));
  $('delCard').addEventListener('click', () => deleteCard(card.id));
  $('addAtt').addEventListener('click', () => addAttachment(card));
}

async function setListCover(list) {
  const file = $('listCoverFile').files[0];
  $('listCoverErr').textContent = '';
  if (!file) { $('listCoverErr').textContent = 'Choose an image first.'; return; }
  if (!file.type.startsWith('image/')) { $('listCoverErr').textContent = 'Banner must be an image.'; return; }
  if (file.size > 10 * 1024 * 1024) { $('listCoverErr').textContent = 'Image is over 10 MB — please use a smaller one.'; return; }
  const btn = $('setListCover');
  btn.disabled = true; btn.textContent = 'Uploading…';
  try {
    const path = `list-covers/${list.id}/${Date.now()}-${file.name.replace(/[^\w.\-]/g, '_')}`;
    const { error } = await sb.storage.from('hub-files').upload(path, file);
    if (error) throw error;
    const oldPath = list.cover_path;
    await api(`lists?id=eq.${list.id}`, { method: 'PATCH', prefer: 'return=minimal',
      body: { cover_path: path } });
    // Clean up the previous banner so replacements don't pile up.
    if (oldPath) { try { await sb.storage.from('hub-files').remove([oldPath]); } catch {} }
    closeListDialog(); await loadBoard();
  } catch (e) {
    $('listCoverErr').textContent = e.message;
    btn.disabled = false; btn.textContent = 'Set banner image';
  }
}

async function removeListCover(list) {
  if (!confirm('Remove this column\u2019s banner image?')) return;
  const path = list.cover_path;
  await api(`lists?id=eq.${list.id}`, { method: 'PATCH', prefer: 'return=minimal',
    body: { cover_path: null } });
  if (path) { try { await sb.storage.from('hub-files').remove([path]); } catch {} }
  closeListDialog(); await loadBoard();
}

async function saveCard(id) {
  const title = $('eTitle').value.trim();
  const description = $('eDesc').value;
  if (!title) return;
  await api(`cards?id=eq.${id}`, { method: 'PATCH', body: { title, description, updated_at: new Date().toISOString() }, prefer: 'return=minimal' });
  await loadBoard(); refreshOpenCard();
}
async function deleteCard(id) {
  if (!confirm('Delete this card and its attachments?')) return;
  await api(`cards?id=eq.${id}`, { method: 'DELETE', prefer: 'return=minimal' });
  closeModal(); await loadBoard();
}

async function addAttachment(card) {
  const type = $('aType').value;
  const label = $('aLabel').value.trim();
  $('attErr').textContent = '';
  if (!label) { $('attErr').textContent = 'Add a label.'; return; }
  const pos = (card.attachments || []).length;

  try {
    if (type === 'file') {
      const file = $('aFile').files[0];
      if (!file) { $('attErr').textContent = 'Choose a file.'; return; }
      if (file.size > 50 * 1024 * 1024) {
        $('attErr').textContent = 'File is over 50 MB. Host large files elsewhere and add a link instead.';
        return;
      }
      const path = `${card.id}/${Date.now()}-${file.name.replace(/[^\w.\-]/g, '_')}`;
      const { error } = await sb.storage.from('hub-files').upload(path, file);
      if (error) throw error;
      await api('attachments', { method: 'POST', prefer: 'return=minimal',
        body: { card_id: card.id, type: 'file', label, storage_path: path, position: pos } });
    } else {
      const url = $('aUrl').value.trim();
      if (!url) { $('attErr').textContent = 'Paste a URL.'; return; }
      await api('attachments', { method: 'POST', prefer: 'return=minimal',
        body: { card_id: card.id, type, label, url, position: pos } });
    }
    await loadBoard(); refreshOpenCard();
  } catch (e) { $('attErr').textContent = e.message; }
}

async function deleteAttachment(id, path) {
  if (!confirm('Delete this attachment?')) return;
  // Delete the row first; only remove the file if that succeeds, so a
  // failed row delete never leaves a card pointing at a missing file.
  await api(`attachments?id=eq.${id}`, { method: 'DELETE', prefer: 'return=minimal' });
  if (path) await sb.storage.from('hub-files').remove([path]);
  await loadBoard(); refreshOpenCard();
}

async function download(path) {
  const { data, error } = await sb.storage.from('hub-files').createSignedUrl(path, 3600);
  if (error) { alert(error.message); return; }
  window.open(data.signedUrl, '_blank', 'noopener');
}

function refreshOpenCard() {
  if (!openCardId) return;
  const c = findCard(openCardId);
  if (c) { $('mTitle').textContent = c.title; renderModal(c); }
  else closeModal();
}

/* ===================================================================
   8. HELPERS
   =================================================================== */
function findCard(id) {
  for (const k in cardsByList) {
    const hit = cardsByList[k].find((c) => c.id === id);
    if (hit) return hit;
  }
  return null;
}
function esc(s) {
  return String(s ?? '').replace(/[&<>"']/g, (m) =>
    ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[m]));
}
function extLabel(name) {
  const ext = (name.split('.').pop() || 'file').toUpperCase();
  return ext.length <= 4 ? ext : 'FILE';
}
function embedUrl(url) {
  if (!url) return null;
  try {
    const u = new URL(url);
    if (u.hostname.includes('youtube.com') && u.searchParams.get('v'))
      return `https://www.youtube.com/embed/${u.searchParams.get('v')}`;
    if (u.hostname.includes('youtu.be'))
      return `https://www.youtube.com/embed/${u.pathname.slice(1)}`;
    if (u.hostname.includes('youtube.com') && u.pathname.startsWith('/embed/'))
      return url;
    if (u.hostname.includes('youtube.com') &&
        (u.pathname.startsWith('/shorts/') || u.pathname.startsWith('/live/')))
      return `https://www.youtube.com/embed/${u.pathname.split('/').filter(Boolean).pop()}`;
    if (u.hostname.includes('vimeo.com')) {
      const id = u.pathname.split('/').filter(Boolean).pop();
      return `https://player.vimeo.com/video/${id}`;
    }
    if (u.hostname.includes('loom.com')) {
      const id = u.pathname.split('/').filter(Boolean).pop();
      return `https://www.loom.com/embed/${id}`;
    }
  } catch (_) {}
  return null;
}
</script>
