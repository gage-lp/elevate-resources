<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Elevate Hub</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<style>
  :root {
    --navy:    #030328;
    --navy-2:  #0a0a3a;
    --charcoal:#1D1D1D;
    --aqua:    #00FBF0;
    --white:   #FFFFFF;
    --muted:   rgba(255,255,255,0.55);
    --line:    rgba(0,251,240,0.16);
    --glass:   rgba(255,255,255,0.04);
    --glass-2: rgba(255,255,255,0.07);
    --danger:  #ff5d6c;
    --radius:  14px;
    --font: 'Montserrat', system-ui, sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    font-family: var(--font);
    color: var(--white);
    background:
      radial-gradient(1200px 600px at 80% -10%, rgba(0,251,240,0.10), transparent 60%),
      radial-gradient(900px 500px at 0% 110%, rgba(0,251,240,0.06), transparent 55%),
      var(--navy);
    min-height: 100vh;
  }
  button { font-family: var(--font); cursor: pointer; }
  .hidden { display: none !important; }

  /* ---------- LOGIN ---------- */
  #login { min-height: 100vh; display: grid; place-items: center; padding: 24px; }
  .login-card {
    width: 100%; max-width: 380px;
    background: var(--glass); border: 1px solid var(--line);
    border-radius: var(--radius); padding: 36px 30px;
    backdrop-filter: blur(14px);
    box-shadow: 0 24px 60px rgba(0,0,0,0.45);
  }
  .brand { display: flex; align-items: baseline; gap: 8px; margin-bottom: 4px; }
  .brand b { font-weight: 800; letter-spacing: 0.5px; font-size: 1.45rem; }
  .brand span { color: var(--aqua); font-weight: 800; font-size: 1.45rem; }
  .sub { color: var(--muted); font-size: 0.82rem; margin-bottom: 26px; }
  label.fld { display: block; font-size: 0.7rem; text-transform: uppercase;
    letter-spacing: 1.2px; color: var(--muted); margin: 14px 0 6px; }
  input, textarea, select {
    width: 100%; font-family: var(--font); color: var(--white);
    background: rgba(0,0,0,0.25); border: 1px solid var(--line);
    border-radius: 10px; padding: 11px 13px; font-size: 0.92rem; outline: none;
  }
  input:focus, textarea:focus, select:focus { border-color: var(--aqua); }
  select option { color: #000; }
  .btn {
    width: 100%; margin-top: 22px; border: none; border-radius: 10px;
    padding: 12px; font-weight: 700; font-size: 0.92rem;
    background: var(--aqua); color: var(--navy);
    transition: transform .08s ease, box-shadow .2s ease;
  }
  .btn:hover { box-shadow: 0 8px 24px rgba(0,251,240,0.25); }
  .btn:active { transform: translateY(1px); }
  .btn.ghost { background: var(--glass-2); color: var(--white); border: 1px solid var(--line); }
  .btn.tiny { width: auto; margin: 0; padding: 7px 12px; font-size: 0.78rem; }
  .err { color: var(--danger); font-size: 0.8rem; margin-top: 12px; min-height: 1em; }

  /* ---------- TOP BAR ---------- */
  header.bar {
    position: sticky; top: 0; z-index: 30;
    display: flex; align-items: center; gap: 16px;
    padding: 14px 22px;
    background: rgba(3,3,40,0.78); backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--line);
  }
  header.bar .brand b, header.bar .brand span { font-size: 1.15rem; }
  header.bar .spacer { flex: 1; }
  .whoami { font-size: 0.8rem; color: var(--muted); }
  .whoami b { color: var(--white); font-weight: 600; }
  .pill { font-size: 0.62rem; text-transform: uppercase; letter-spacing: 1px;
    padding: 3px 8px; border-radius: 999px; border: 1px solid var(--line);
    color: var(--aqua); margin-left: 8px; }

  /* ---------- SEARCH ---------- */
  .search-wrap {
    position: relative; display: flex; align-items: center;
    margin-left: 18px; max-width: 320px; flex: 1;
  }
  .search-ico {
    position: absolute; left: 11px; color: var(--muted);
    font-size: 1.05rem; pointer-events: none;
  }
  #search {
    width: 100%; padding: 8px 30px 8px 30px; font-size: 0.85rem;
    border-radius: 999px; background: rgba(0,0,0,0.28); border: 1px solid var(--line);
  }
  #search::-webkit-search-cancel-button { display: none; }
  .search-clear {
    position: absolute; right: 8px; background: none; border: none;
    color: var(--muted); font-size: 1.1rem; line-height: 1; padding: 2px 6px;
  }
  .search-clear:hover { color: var(--white); }
  .card.filtered-out { display: none; }
  .no-match {
    font-size: 0.78rem; color: var(--muted); text-align: center;
    padding: 14px 8px; font-style: italic;
  }
  mark {
    background: rgba(0,251,240,0.28); color: var(--white);
    border-radius: 3px; padding: 0 1px;
  }

  /* ---------- BOARD ---------- */
  .board {
    display: flex; gap: 18px; align-items: flex-start;
    padding: 24px 22px; overflow-x: auto;
    height: calc(100vh - 60px);
  }
  .list {
    flex: 0 0 300px; width: 300px;
    max-height: 100%;
    display: flex; flex-direction: column;
    background: var(--glass); border: 1px solid var(--line);
    border-radius: var(--radius); padding: 12px;
    backdrop-filter: blur(10px);
  }
  .list-head { display: flex; align-items: center; gap: 8px; padding: 4px 6px 12px; cursor: grab; flex: 0 0 auto; }
  .list-head h3 { font-size: 0.86rem; font-weight: 700; letter-spacing: 0.4px; flex: 1; }
  .count { font-size: 0.72rem; color: var(--muted); }
  .list-menu { background: none; border: none; color: var(--muted); font-size: 1rem; padding: 2px 6px; cursor: pointer; }
  .list-menu:hover { color: var(--aqua); }
  .cards {
    display: flex; flex-direction: column; gap: 10px; min-height: 8px;
    overflow-y: auto; flex: 1 1 auto;
    margin: 0 -4px; padding: 0 4px;
  }
  /* slim scrollbar inside columns */
  .cards::-webkit-scrollbar { width: 8px; }
  .cards::-webkit-scrollbar-thumb { background: var(--line); border-radius: 8px; }
  .cards::-webkit-scrollbar-track { background: transparent; }
  .cards { scrollbar-width: thin; scrollbar-color: var(--line) transparent; }
  .card {
    background: var(--glass-2); border: 1px solid rgba(255,255,255,0.08);
    border-radius: 10px; padding: 11px 12px; transition: border-color .15s ease, transform .08s ease;
  }
  .card:hover { border-color: var(--aqua); }
  .card .title { font-size: 0.86rem; font-weight: 600; line-height: 1.3; }
  .card .meta { display: flex; gap: 12px; margin-top: 8px; font-size: 0.7rem; color: var(--muted); }
  .card .meta span { display: inline-flex; align-items: center; gap: 4px; }
  .add-card, .add-list-btn {
    width: 100%; text-align: left; margin-top: 10px; background: transparent;
    border: 1px dashed var(--line); color: var(--muted); border-radius: 10px;
    padding: 9px 12px; font-size: 0.8rem; flex: 0 0 auto;
  }
  .add-card:hover, .add-list-btn:hover { color: var(--aqua); border-color: var(--aqua); }
  .add-list { flex: 0 0 300px; }
  .sortable-ghost { opacity: 0.4; }
  .sortable-drag { box-shadow: 0 14px 30px rgba(0,0,0,0.5); }

  /* ---------- MODAL ---------- */
  .overlay {
    position: fixed; inset: 0; z-index: 50; display: grid; place-items: start center;
    background: rgba(0,0,0,0.55); padding: 40px 16px; overflow-y: auto;
  }
  .modal {
    width: 100%; max-width: 640px; background: var(--navy-2);
    border: 1px solid var(--line); border-radius: var(--radius);
    box-shadow: 0 30px 80px rgba(0,0,0,0.6);
  }
  .modal-head { display: flex; align-items: flex-start; gap: 12px; padding: 22px 24px 8px; }
  .modal-head h2 { font-size: 1.15rem; font-weight: 700; flex: 1; line-height: 1.3; }
  .x { background: none; border: none; color: var(--muted); font-size: 1.4rem; line-height: 1; }
  .x:hover { color: var(--white); }
  .modal-body { padding: 8px 24px 26px; }
  .section-label { font-size: 0.68rem; text-transform: uppercase; letter-spacing: 1.2px;
    color: var(--aqua); margin: 22px 0 10px; font-weight: 700; }
  .desc { font-size: 0.9rem; line-height: 1.55; color: rgba(255,255,255,0.85); white-space: pre-wrap; }
  .att { display: flex; align-items: center; gap: 10px; padding: 10px 12px;
    background: var(--glass); border: 1px solid var(--line); border-radius: 10px; margin-bottom: 8px; }
  .att .ico { width: 30px; height: 30px; display: grid; place-items: center; border-radius: 7px;
    background: rgba(0,251,240,0.12); color: var(--aqua); font-size: 0.62rem; font-weight: 700; }
  .att .lbl { flex: 1; font-size: 0.84rem; }
  .att a, .att button { color: var(--aqua); background: none; border: none; font-size: 0.8rem; text-decoration: none; cursor: pointer; }
  .embed { position: relative; padding-bottom: 56.25%; height: 0; margin-bottom: 10px; border-radius: 10px; overflow: hidden; }
  .embed iframe { position: absolute; inset: 0; width: 100%; height: 100%; border: 0; }
  .admin-box { border: 1px solid var(--line); border-radius: 10px; padding: 14px; margin-top: 14px; background: rgba(0,0,0,0.18); }
  .row { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
  .row > * { flex: 1; min-width: 120px; }
  .danger { color: var(--danger) !important; }
  @media (max-width: 520px) {
    .list, .add-list { flex-basis: 84vw; width: 84vw; }
  }
</style>
</head>
<body>

<!-- ===== LOGIN ===== -->
<div id="login">
  <div class="login-card">
    <div class="brand"><b>Elevate</b><span>Hub</span></div>
    <div class="sub">Elevate Realty Group — team resources</div>
    <label class="fld" for="email">Email</label>
    <input id="email" type="email" autocomplete="username" placeholder="you@elevate.ca" />
    <label class="fld" for="pw">Password</label>
    <input id="pw" type="password" autocomplete="current-password" placeholder="••••••••" />
    <button class="btn" id="signin">Sign in</button>
    <div class="err" id="loginErr"></div>
  </div>
</div>

<!-- ===== APP ===== -->
<div id="app" class="hidden">
  <header class="bar">
    <div class="brand"><b>Elevate</b><span>Hub</span></div>
    <div class="search-wrap">
      <span class="search-ico">⌕</span>
      <input id="search" type="search" placeholder="Search cards…" autocomplete="off" />
      <button class="search-clear hidden" id="searchClear" title="Clear">×</button>
    </div>
    <div class="spacer"></div>
    <div class="whoami">Signed in as <b id="userName">—</b><span class="pill" id="rolePill"></span></div>
    <button class="btn ghost tiny" id="signout">Sign out</button>
  </header>
  <div class="board" id="board"></div>
</div>

<!-- ===== CARD MODAL ===== -->
<div class="overlay hidden" id="overlay">
  <div class="modal">
    <div class="modal-head">
      <h2 id="mTitle">—</h2>
      <button class="x" id="mClose">×</button>
    </div>
    <div class="modal-body" id="mBody"></div>
  </div>
</div>

<script type="module">
import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';
import Sortable from 'https://esm.sh/sortablejs@1.15.2';

/* ===================================================================
   1. CONFIG  —  paste your project values here
   =================================================================== */
const SUPABASE_URL  = 'https://qxjabxuqwokqpmoqdlnl.supabase.co';
const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InF4amFieHVxd29rcXBtb3FkbG5sIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIzMjQ0NzUsImV4cCI6MjA5NzkwMDQ3NX0.KQKvmZzpQ8CzxKJTOouEAAQsxlp5Qae-VPAdx1EJ0jc';

const sb = createClient(SUPABASE_URL, SUPABASE_ANON);

/* ===================================================================
   2. STATE
   =================================================================== */
let session = null;
let me = { id: null, name: '', role: 'agent', isAdmin: false };
let lists = [];
let cardsByList = {};
let searchQuery = '';

const $ = (id) => document.getElementById(id);

/* Direct PostgREST call (matches the Academy pattern). */
async function api(path, { method = 'GET', body, prefer } = {}) {
  const headers = {
    apikey: SUPABASE_ANON,
    Authorization: `Bearer ${session.access_token}`,
  };
  if (body) headers['Content-Type'] = 'application/json';
  if (prefer) headers['Prefer'] = prefer;
  const res = await fetch(`${SUPABASE_URL}/rest/v1/${path}`, {
    method, headers, body: body ? JSON.stringify(body) : undefined,
  });
  if (!res.ok) throw new Error(`${res.status} ${await res.text()}`);
  const txt = await res.text();
  return txt ? JSON.parse(txt) : null;
}

/* ===================================================================
   3. AUTH
   =================================================================== */
async function boot() {
  const { data } = await sb.auth.getSession();
  if (data.session) { session = data.session; await enterApp(); }
}
boot();

/* Keep our captured session current. supabase-js auto-refreshes the
   access token (~hourly); without this our copy goes stale and every
   PostgREST call 401s until reload. */
sb.auth.onAuthStateChange((_event, s) => { if (s) session = s; });

$('signin').addEventListener('click', signIn);
$('pw').addEventListener('keydown', (e) => { if (e.key === 'Enter') signIn(); });

async function signIn() {
  $('loginErr').textContent = '';
  const email = $('email').value.trim();
  const password = $('pw').value;
  if (!email || !password) { $('loginErr').textContent = 'Enter your email and password.'; return; }
  const { data, error } = await sb.auth.signInWithPassword({ email, password });
  if (error) { $('loginErr').textContent = error.message; return; }
  session = data.session;
  await enterApp();
}

$('signout').addEventListener('click', async () => {
  await sb.auth.signOut();
  location.reload();
});

async function enterApp() {
  const profile = await api(`profiles?id=eq.${session.user.id}&select=*`);
  const p = profile[0] || {};
  me = {
    id: session.user.id,
    name: p.full_name || session.user.email,
    role: p.role || 'agent',
    isAdmin: p.role === 'admin',
  };
  $('userName').textContent = me.name;
  $('rolePill').textContent = me.isAdmin ? 'Admin' : 'Agent';
  $('login').classList.add('hidden');
  $('app').classList.remove('hidden');
  await loadBoard();
}

/* ===================================================================
   4. LOAD + RENDER BOARD
   =================================================================== */
async function loadBoard() {
  lists = await api('lists?select=*&order=position.asc');
  const cards = await api('cards?select=*,attachments(*)&order=position.asc');
  cardsByList = {};
  for (const l of lists) cardsByList[l.id] = [];
  for (const c of cards) {
    (c.attachments || []).sort((a, b) => a.position - b.position);
    (cardsByList[c.list_id] ||= []).push(c);
  }
  renderBoard();
}

function renderBoard() {
  const board = $('board');
  board.innerHTML = '';

  for (const l of lists) {
    const cards = cardsByList[l.id] || [];
    const el = document.createElement('div');
    el.className = 'list';
    el.dataset.listId = l.id;
    el.innerHTML = `
      <div class="list-head">
        <h3>${esc(l.title)}</h3>
        <span class="count">${cards.length}</span>
        ${me.isAdmin ? `<button class="list-menu" title="Rename / delete">⋯</button>` : ''}
      </div>
      <div class="cards" data-list-id="${l.id}"></div>
      ${me.isAdmin ? `<button class="add-card">+ Add a card</button>` : ''}
    `;
    const cardsWrap = el.querySelector('.cards');
    cards.forEach((c) => cardsWrap.appendChild(cardEl(c)));

    if (me.isAdmin) {
      el.querySelector('.add-card').addEventListener('click', () => addCard(l.id));
      el.querySelector('.list-menu').addEventListener('click', () => editList(l));
    }
    board.appendChild(el);
    if (me.isAdmin) makeCardsSortable(cardsWrap);
  }

  if (me.isAdmin) {
    const add = document.createElement('div');
    add.className = 'add-list';
    add.innerHTML = `<button class="add-list-btn">+ Add a list</button>`;
    add.querySelector('button').addEventListener('click', addList);
    board.appendChild(add);
    makeListsSortable(board);
  }

  filterBoard(); // re-apply any active search after a re-render
}

/* ===================================================================
   SEARCH — live client-side filter over title + description + labels
   =================================================================== */
function filterBoard() {
  const q = searchQuery.trim().toLowerCase();
  document.querySelectorAll('.list').forEach((listEl) => {
    const wrap = listEl.querySelector('.cards');
    let shown = 0;
    wrap.querySelectorAll('.card').forEach((card) => {
      const hit = !q || (card.dataset.search || '').includes(q);
      card.classList.toggle('filtered-out', !hit);
      if (hit) shown++;
    });
    // "No matches" placeholder, only while searching and only if this
    // column had cards to begin with.
    let note = wrap.querySelector('.no-match');
    const total = wrap.querySelectorAll('.card').length;
    if (q && total > 0 && shown === 0) {
      if (!note) {
        note = document.createElement('div');
        note.className = 'no-match';
        note.textContent = 'No matches';
        wrap.appendChild(note);
      }
    } else if (note) {
      note.remove();
    }
  });
}

function setSearch(value) {
  searchQuery = value;
  $('searchClear').classList.toggle('hidden', !value);
  filterBoard();
}

$('search').addEventListener('input', (e) => setSearch(e.target.value));
$('searchClear').addEventListener('click', () => {
  $('search').value = '';
  setSearch('');
  $('search').focus();
});
$('search').addEventListener('keydown', (e) => {
  if (e.key === 'Escape') { $('search').value = ''; setSearch(''); }
});

function cardEl(c) {
  const el = document.createElement('div');
  el.className = 'card';
  el.dataset.cardId = c.id;
  // Precomputed haystack: title + description + attachment labels, lowercased.
  const labels = (c.attachments || []).map((a) => a.label || '').join(' ');
  el.dataset.search = `${c.title} ${c.description || ''} ${labels}`.toLowerCase();
  const fileCount  = (c.attachments || []).filter((a) => a.type === 'file').length;
  const videoCount = (c.attachments || []).filter((a) => a.type === 'video').length;
  const meta = [];
  if (c.description) meta.push(`<span title="Has description">≡</span>`);
  if (fileCount)  meta.push(`<span>📎 ${fileCount}</span>`);
  if (videoCount) meta.push(`<span>▶ ${videoCount}</span>`);
  el.innerHTML = `<div class="title">${esc(c.title)}</div>${
    meta.length ? `<div class="meta">${meta.join('')}</div>` : ''}`;
  el.addEventListener('click', () => openCard(c.id));
  return el;
}

/* ===================================================================
   5. DRAG + DROP (admin only) — persists position to Supabase
   =================================================================== */
function makeCardsSortable(wrap) {
  new Sortable(wrap, {
    group: 'cards', animation: 150,
    ghostClass: 'sortable-ghost', dragClass: 'sortable-drag',
    onEnd: persistCardOrder,
  });
}
function makeListsSortable(board) {
  new Sortable(board, {
    animation: 150, draggable: '.list', handle: '.list-head',
    ghostClass: 'sortable-ghost',
    onEnd: persistListOrder,
  });
}

async function persistCardOrder(evt) {
  const fromId = evt.from.dataset.listId;
  const toId   = evt.to.dataset.listId;
  const updates = [];
  for (const wrapId of new Set([fromId, toId])) {
    const wrap = document.querySelector(`.cards[data-list-id="${wrapId}"]`);
    [...wrap.children].forEach((el, i) => {
      updates.push(api(`cards?id=eq.${el.dataset.cardId}`, {
        method: 'PATCH', body: { position: i, list_id: wrapId }, prefer: 'return=minimal',
      }));
    });
  }
  try { await Promise.all(updates); await loadBoard(); }
  catch (e) { alert('Could not save order: ' + e.message); await loadBoard(); }
}

async function persistListOrder() {
  const els = [...document.querySelectorAll('.list')];
  try {
    await Promise.all(els.map((el, i) =>
      api(`lists?id=eq.${el.dataset.listId}`, { method: 'PATCH', body: { position: i }, prefer: 'return=minimal' })));
    await loadBoard();
  } catch (e) { alert('Could not save list order: ' + e.message); await loadBoard(); }
}

/* ===================================================================
   6. ADMIN — list / card CRUD
   =================================================================== */
async function addList() {
  const title = prompt('New list name:');
  if (!title) return;
  await api('lists', { method: 'POST', body: { title, position: lists.length }, prefer: 'return=minimal' });
  await loadBoard();
}
async function editList(l) {
  const action = prompt(`Edit "${l.title}".\nType a new name to rename, or type DELETE to remove the list and its cards.`, l.title);
  if (action === null) return;
  if (action.trim().toUpperCase() === 'DELETE') {
    if (!confirm(`Delete "${l.title}" and all its cards?`)) return;
    await api(`lists?id=eq.${l.id}`, { method: 'DELETE', prefer: 'return=minimal' });
  } else if (action.trim()) {
    await api(`lists?id=eq.${l.id}`, { method: 'PATCH', body: { title: action.trim() }, prefer: 'return=minimal' });
  }
  await loadBoard();
}
async function addCard(listId) {
  const title = prompt('Card title:');
  if (!title) return;
  const pos = (cardsByList[listId] || []).length;
  await api('cards', { method: 'POST', body: { list_id: listId, title, position: pos }, prefer: 'return=minimal' });
  await loadBoard();
}

/* ===================================================================
   7. CARD MODAL
   =================================================================== */
let openCardId = null;

async function openCard(id) {
  openCardId = id;
  const card = findCard(id);
  $('mTitle').textContent = card.title;
  renderModal(card);
  $('overlay').classList.remove('hidden');
}
$('mClose').addEventListener('click', closeModal);
$('overlay').addEventListener('click', (e) => { if (e.target === $('overlay')) closeModal(); });
function closeModal() { $('overlay').classList.add('hidden'); openCardId = null; }

function renderModal(card) {
  const atts = card.attachments || [];
  const videos = atts.filter((a) => a.type === 'video');
  const files  = atts.filter((a) => a.type === 'file');
  const links  = atts.filter((a) => a.type === 'link');

  let html = '';

  html += `<div class="section-label">Description</div>`;
  html += card.description
    ? `<div class="desc">${esc(card.description)}</div>`
    : `<div class="desc" style="color:var(--muted)">No description yet.</div>`;

  if (videos.length) {
    html += `<div class="section-label">Video</div>`;
    videos.forEach((v) => {
      const src = embedUrl(v.url);
      html += src
        ? `<div class="embed"><iframe src="${src}" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe></div>`
        : `<div class="att"><div class="ico">▶</div><div class="lbl">${esc(v.label)}</div><a href="${esc(v.url)}" target="_blank" rel="noopener">Open ↗</a></div>`;
      if (me.isAdmin) html += `<div class="att"><div class="lbl" style="color:var(--muted);font-size:.78rem">${esc(v.label)}</div><button class="danger" data-delatt="${v.id}">Remove video</button></div>`;
    });
  }

  if (files.length || links.length) {
    html += `<div class="section-label">Attachments</div>`;
    files.forEach((f) => {
      html += `<div class="att">
        <div class="ico">${esc(extLabel(f.label))}</div>
        <div class="lbl">${esc(f.label)}</div>
        <button data-dl="${esc(f.storage_path)}">Download ↓</button>
        ${me.isAdmin ? `<button class="danger" data-delatt="${f.id}" data-path="${esc(f.storage_path)}">Delete</button>` : ''}
      </div>`;
    });
    links.forEach((lk) => {
      html += `<div class="att">
        <div class="ico">🔗</div>
        <div class="lbl">${esc(lk.label)}</div>
        <a href="${esc(lk.url)}" target="_blank" rel="noopener">Open ↗</a>
        ${me.isAdmin ? `<button class="danger" data-delatt="${lk.id}">Delete</button>` : ''}
      </div>`;
    });
  }

  if (me.isAdmin) {
    html += `
      <div class="admin-box">
        <div class="section-label" style="margin-top:0">Edit card</div>
        <input id="eTitle" value="${esc(card.title)}" />
        <textarea id="eDesc" rows="4" style="margin-top:10px" placeholder="Description...">${esc(card.description || '')}</textarea>
        <div class="row" style="margin-top:10px">
          <button class="btn tiny" id="saveCard">Save changes</button>
          <button class="btn ghost tiny danger" id="delCard">Delete card</button>
        </div>
        <div class="section-label">Add attachment</div>
        <div class="row">
          <select id="aType">
            <option value="file">File (PDF, image, doc…)</option>
            <option value="video">Video embed (YouTube / Vimeo / Loom)</option>
            <option value="link">External link</option>
          </select>
        </div>
        <div class="row" style="margin-top:10px">
          <input id="aLabel" placeholder="Label shown to agents" />
        </div>
        <div class="row" id="aFileRow" style="margin-top:10px">
          <input id="aFile" type="file" />
        </div>
        <div class="row hidden" id="aUrlRow" style="margin-top:10px">
          <input id="aUrl" placeholder="Paste URL" />
        </div>
        <div class="row" style="margin-top:10px">
          <button class="btn tiny" id="addAtt">Add attachment</button>
        </div>
        <div class="err" id="attErr"></div>
      </div>`;
  }

  $('mBody').innerHTML = html;
  wireModal(card);
}

function wireModal(card) {
  $('mBody').querySelectorAll('[data-dl]').forEach((b) =>
    b.addEventListener('click', () => download(b.dataset.dl)));

  if (!me.isAdmin) return;

  $('mBody').querySelectorAll('[data-delatt]').forEach((b) =>
    b.addEventListener('click', () => deleteAttachment(b.dataset.delatt, b.dataset.path)));

  const typeSel = $('aType');
  const sync = () => {
    const isFile = typeSel.value === 'file';
    $('aFileRow').classList.toggle('hidden', !isFile);
    $('aUrlRow').classList.toggle('hidden', isFile);
  };
  typeSel.addEventListener('change', sync); sync();

  $('saveCard').addEventListener('click', () => saveCard(card.id));
  $('delCard').addEventListener('click', () => deleteCard(card.id));
  $('addAtt').addEventListener('click', () => addAttachment(card));
}

async function saveCard(id) {
  const title = $('eTitle').value.trim();
  const description = $('eDesc').value;
  if (!title) return;
  await api(`cards?id=eq.${id}`, { method: 'PATCH', body: { title, description, updated_at: new Date().toISOString() }, prefer: 'return=minimal' });
  await loadBoard(); refreshOpenCard();
}
async function deleteCard(id) {
  if (!confirm('Delete this card and its attachments?')) return;
  await api(`cards?id=eq.${id}`, { method: 'DELETE', prefer: 'return=minimal' });
  closeModal(); await loadBoard();
}

async function addAttachment(card) {
  const type = $('aType').value;
  const label = $('aLabel').value.trim();
  $('attErr').textContent = '';
  if (!label) { $('attErr').textContent = 'Add a label.'; return; }
  const pos = (card.attachments || []).length;

  try {
    if (type === 'file') {
      const file = $('aFile').files[0];
      if (!file) { $('attErr').textContent = 'Choose a file.'; return; }
      if (file.size > 50 * 1024 * 1024) {
        $('attErr').textContent = 'File is over 50 MB. Host large files elsewhere and add a link instead.';
        return;
      }
      const path = `${card.id}/${Date.now()}-${file.name.replace(/[^\w.\-]/g, '_')}`;
      const { error } = await sb.storage.from('hub-files').upload(path, file);
      if (error) throw error;
      await api('attachments', { method: 'POST', prefer: 'return=minimal',
        body: { card_id: card.id, type: 'file', label, storage_path: path, position: pos } });
    } else {
      const url = $('aUrl').value.trim();
      if (!url) { $('attErr').textContent = 'Paste a URL.'; return; }
      await api('attachments', { method: 'POST', prefer: 'return=minimal',
        body: { card_id: card.id, type, label, url, position: pos } });
    }
    await loadBoard(); refreshOpenCard();
  } catch (e) { $('attErr').textContent = e.message; }
}

async function deleteAttachment(id, path) {
  if (!confirm('Delete this attachment?')) return;
  // Delete the row first; only remove the file if that succeeds, so a
  // failed row delete never leaves a card pointing at a missing file.
  await api(`attachments?id=eq.${id}`, { method: 'DELETE', prefer: 'return=minimal' });
  if (path) await sb.storage.from('hub-files').remove([path]);
  await loadBoard(); refreshOpenCard();
}

async function download(path) {
  const { data, error } = await sb.storage.from('hub-files').createSignedUrl(path, 3600);
  if (error) { alert(error.message); return; }
  window.open(data.signedUrl, '_blank', 'noopener');
}

function refreshOpenCard() {
  if (!openCardId) return;
  const c = findCard(openCardId);
  if (c) { $('mTitle').textContent = c.title; renderModal(c); }
  else closeModal();
}

/* ===================================================================
   8. HELPERS
   =================================================================== */
function findCard(id) {
  for (const k in cardsByList) {
    const hit = cardsByList[k].find((c) => c.id === id);
    if (hit) return hit;
  }
  return null;
}
function esc(s) {
  return String(s ?? '').replace(/[&<>"']/g, (m) =>
    ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[m]));
}
function extLabel(name) {
  const ext = (name.split('.').pop() || 'file').toUpperCase();
  return ext.length <= 4 ? ext : 'FILE';
}
function embedUrl(url) {
  if (!url) return null;
  try {
    const u = new URL(url);
    if (u.hostname.includes('youtube.com') && u.searchParams.get('v'))
      return `https://www.youtube.com/embed/${u.searchParams.get('v')}`;
    if (u.hostname.includes('youtu.be'))
      return `https://www.youtube.com/embed/${u.pathname.slice(1)}`;
    if (u.hostname.includes('youtube.com') && u.pathname.startsWith('/embed/'))
      return url;
    if (u.hostname.includes('youtube.com') &&
        (u.pathname.startsWith('/shorts/') || u.pathname.startsWith('/live/')))
      return `https://www.youtube.com/embed/${u.pathname.split('/').filter(Boolean).pop()}`;
    if (u.hostname.includes('vimeo.com')) {
      const id = u.pathname.split('/').filter(Boolean).pop();
      return `https://player.vimeo.com/video/${id}`;
    }
    if (u.hostname.includes('loom.com')) {
      const id = u.pathname.split('/').filter(Boolean).pop();
      return `https://www.loom.com/embed/${id}`;
    }
  } catch (_) {}
  return null;
}
